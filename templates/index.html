<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Drone - GCS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Welcome to Lab Drone</div>
            <nav>
                <a href="#">Info</a>
                <a href="#">LAB</a>
                <a href="#">GCS</a>
                <button>로그인</button>
            </nav>
        </header>

        <h1>GCS - Drone</h1>

        <div>
            <div class="map-title">
                <div class="map-icon">🗺️</div>
                <h3>드론의 현재위치 정보</h3>
            </div>
            <div class="map-container">
                <div class="map-section">
                    <div id="map" class="map"></div>
                    <div class="map-inputs">
                        <!-- placeholder 사용: readonly input에 value로 넣으면 실제 값처럼 보임 -->
                        <input type="text" id="lat-display" placeholder="위도: --" readonly>
                        <input type="text" id="lon-display" placeholder="경도: --" readonly>
                        <button>Load</button>
                    </div>
                </div>
                <div class="status-container">
                    <div class="status-grid">
                        <div class="status-box">
                            <h4>배터리 상태</h4>
                            <p><span id="battery-value">--</span>% <span>🔋</span></p>
                        </div>
                        <div class="status-box">
                            <h4>GPS 상태</h4>
                            <p>위성: <span id="gps-satellites">--</span>개 <span>📍</span></p>
                        </div>
                        <div class="status-box">
                            <h4>텔레메트리 상태</h4>
                            <p id="telemetry-status">연결 대기 중 <span>📡</span></p>
                        </div>
                        <div class="status-box">
                            <h4>컴패니언 컴퓨터</h4>
                            <p>Raspberry Pi 3B <span>💻</span></p>
                        </div>
                    </div>
                    <img src="{{ url_for('static', filename='images/drone.png') }}" alt="Drone" class="drone-image">
                    <div class="drone-info">
                        <h4>픽스 호크 드론</h4>
                        <p>F540 교육용 드론</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- server_response 출력 영역 -->
        <p id="data" style="margin-top:1rem; color:#666; font-size:0.8rem;"></p>
    </div>

    <!-- Socket.IO 클라이언트 (누락되어 io is not defined 오류 발생하던 것 수정) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;
        b=b[c]||(b[c]={});
        var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));
        e.set("libraries",[...r]+"");
        for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);
        e.set("callback",c+".maps."+q);
        a.src=`https://maps.${c}apis.com/maps/api/js?`+e;
        d[q]=f;
        a.onerror=()=>h=n(Error(p+" could not load."));
        a.nonce=m.querySelector("script[nonce]")?.nonce||"";
        m.head.append(a)}));
        d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "{{API_key}}",
            v: "weekly",
        });

        // DOMContentLoaded에서만 initMap 호출 (script.js의 중복 호출 제거됨)
        window.addEventListener("DOMContentLoaded", function() {
            initMap();
        });
    </script>

    <script>
        var socket = io.connect('http://' + document.domain + ':' + location.port);

        socket.on('connect', function() {
            console.log('Connected to server');
            document.getElementById('telemetry-status').innerHTML = '상태: 양호 <span>📡</span>';
        });

        socket.on('disconnect', function() {
            document.getElementById('telemetry-status').innerHTML = '연결 끊김 <span>📡</span>';
        });

        socket.on('server_response', function(data) {
            document.getElementById('data').innerHTML = 'Received: ' + data.value;
        });

        // 드론 실시간 텔레메트리 수신
        socket.on('drone_data', function(data) {
            if (data.type === 'position') {
                document.getElementById('lat-display').value = '위도: ' + data.lat.toFixed(6);
                document.getElementById('lon-display').value = '경도: ' + data.lon.toFixed(6);
                // 지도 마커 업데이트
                if (typeof updateMapMarker === 'function') {
                    updateMapMarker(data.lat, data.lon);
                }
            } else if (data.type === 'status') {
                var pct = data.battery >= 0 ? data.battery : '--';
                document.getElementById('battery-value').textContent = pct;
            } else if (data.type === 'gps') {
                document.getElementById('gps-satellites').textContent = data.satellites_visible;
            }
        });
    </script>

</body>
</html>
